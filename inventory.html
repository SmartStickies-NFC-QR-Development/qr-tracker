<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Shop | Virtual Golden Ticket - SmartStickies</title>
    <style>
        :root{
            --blue:#1A56FF;
            --sky:#38BFFF;
            --muted:#7A8CB0;
            --green:#0FD48C;
            --gold:#F5B301;
            --trans:.25s cubic-bezier(.4,0,.2,1);
        }
        *{box-sizing:border-box}
        body{
            margin:0;font-family:'Plus Jakarta Sans',sans-serif;
            background:#F1F5FF;color:#0D1B3E;min-height:100vh;
        }
        header{
            background:linear-gradient(135deg,var(--blue),var(--sky));
            color:#fff;padding:22px 20px;
            display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
        }
        .brand{display:flex;align-items:center;gap:10px}
        .brand .logo{
            width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.18);
            display:flex;align-items:center;justify-content:center;flex-shrink:0;
        }
        .brand .logo svg{width:24px;height:24px;fill:#fff}
        .brand h1{font-family:'Figtree',sans-serif;font-size:1.2rem;font-weight:900;margin:0;letter-spacing:-.3px}
        .brand p{margin:2px 0 0;font-size:.78rem;opacity:.85}
        .logout{
            color:#fff;text-decoration:none;font-size:.82rem;font-weight:700;
            border:1.5px solid rgba(255,255,255,.5);padding:8px 14px;border-radius:40px;
            transition:background var(--trans);
        }
        .logout:hover{background:rgba(255,255,255,.18)}
        .wrap{max-width:760px;margin:0 auto;padding:24px 18px 60px}
        .hello{font-family:'Figtree',sans-serif;font-size:1.15rem;font-weight:800;margin:0 0 4px}
        .sub{color:var(--muted);font-size:.85rem;margin:0 0 20px}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
        .card{
            background:#fff;border-radius:16px;padding:18px;position:relative;
            box-shadow:0 6px 20px rgba(13,27,62,.05);
            border:1.5px solid transparent;transition:transform var(--trans);
        }
        .card:hover{transform:translateY(-3px)}
        .card.golden{border-color:var(--gold);background:#FFFBEF}
        .card .tag{font-size:.66rem;font-weight:800;color:var(--muted);letter-spacing:.5px}
        .card .name{font-family:'Figtree',sans-serif;font-weight:800;font-size:1.02rem;margin:4px 0 6px}
        .card .price{font-size:1rem;font-weight:800;color:var(--blue)}
        .ribbon{
            display:inline-flex;align-items:center;gap:5px;margin-top:12px;
            font-size:.68rem;font-weight:800;color:#916400;background:#FFE9A8;
            padding:5px 10px;border-radius:30px;letter-spacing:.4px;
        }
        .loading,.empty{text-align:center;color:var(--muted);padding:40px;font-size:.9rem}
        #msg{text-align:center;color:#E23744;font-size:.85rem;font-weight:700}
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo"><svg viewBox="0 0 24 24"><path d="M1 1l22 4-4 10H6l-1 3h16v2H5l1.5-4.5L4 5H1zm5.5 16a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm11 0a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg></div>
            <div>
                <h1>SmartStickies Shop</h1>
                <p>Scan a product to win a golden ticket</p>
            </div>
        </div>
        <a class="logout" href="member-portal.html" id="logout-link">Log out</a>
    </header>

    <div class="wrap">
        <p class="hello" id="hello">Welcome!</p>
        <p class="sub">Golden-ticket items are highlighted in gold — those are today's winners.</p>
        <div id="msg"></div>
        <div id="grid"><div class="loading">Loading products…</div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import {
            getFirestore, collection, getDocs
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYtjjb3fbReIhWTD0WPJUUaQO-GKVwXkk",
            authDomain: "smart-stickies-b3034.firebaseapp.com",
            projectId: "smart-stickies-b3034",
            storageBucket: "smart-stickies-b3034.firebasestorage.app",
            messagingSenderId: "458444274779",
            appId: "1:458444274779:web:877a52b817112c387bd37e",
            measurementId: "G-0HFGTXJJFS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const firstName = localStorage.getItem('sm_first-name');
        if (firstName) document.getElementById('hello').textContent = `Welcome, ${firstName}!`;

        document.getElementById('logout-link').onclick = function () {
            localStorage.removeItem('sm_first-name');
            localStorage.removeItem('sm_is-admin');
        };

        const gridEl = document.getElementById('grid');

        function card(id, p) {
            return `
                <div class="card ${p.golden ? 'golden' : ''}">
                    <div class="tag">TAG ${id}</div>
                    <div class="name">${p.name}</div>
                    <div class="price">${p.price}</div>
                    ${p.golden ? '<div class="ribbon">🎟️ GOLDEN TICKET</div>' : ''}
                </div>`;
        }

        async function load() {
            try {
                const snap = await getDocs(collection(db, 'products'));
                if (snap.empty) {
                    gridEl.innerHTML = '<div class="empty">No products yet. Ask an admin to set up the catalog.</div>';
                    return;
                }
                const rows = [];
                snap.forEach(d => rows.push([d.id, d.data()]));
                rows.sort((a, b) => a[0].localeCompare(b[0]));
                gridEl.innerHTML = rows.map(([id, p]) => card(id, p)).join('');
            } catch (e) {
                gridEl.innerHTML = '';
                document.getElementById('msg').textContent = 'Could not load products: ' + e.message;
            }
        }

        load();
    </script>
</body>
</html>
